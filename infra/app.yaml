  patchingMode: Automatic
  provisioningState: Succeeded
  runningStatus: Running
  template:
    containers:
    - env:
      - name: HF_HOME
        value: /tmp/hf-models   # local ephemeral disk — overrides the Dockerfile's
                                # /app/data/models, which is now a slow network share
      - name: AZURE_OPENAI_ENDPOINT
        value: https://adaptiverag-openai.openai.azure.com/
      - name: AZURE_OPENAI_DEPLOYMENT
        value: gpt-4o
      - name: AZURE_OPENAI_API_KEY
        secretRef: azure-openai-api-key
        value: ''
      - name: AUDIT_HMAC_KEY
        secretRef: audit-hmac-key
        value: ''
      - name: TAVILY_API_KEY
        secretRef: tavily-api-key
        value: ''
      - name: ADAPTIVERAG_API_KEYS
        secretRef: adaptiverag-api-keys
        value: ''
      image: ghcr.io/2407adi/adaptiverag:latest
      imageType: ContainerImage
      name: adaptiverag
      resources:
        cpu: 2.0
        ephemeralStorage: 8Gi
        memory: 4Gi
      probes:
      - type: Startup
        tcpSocket:
          port: 8000
        periodSeconds: 5        # poke every 5s
        failureThreshold: 240   # tolerate 20 min of booting (SMB-era insurance)
        timeoutSeconds: 3
      volumeMounts:
      - volumeName: data
        mountPath: /app/data    # the container's data dir IS the share now
    volumes:                        # sibling of containers:, inside template:
      - name: data
        storageType: AzureFile
        storageName: adaptiverag-data   # the alias registered in lego 4
        mountOptions: nobrl             # keep SQLite's file locks client-side —
                                        # SMB lock handling hangs SQLite/Chroma;
                                        # safe because max-replicas = 1 (single writer)
    customMetricsSettings: null
    initContainers: null
    revisionSuffix: ''
    scale:
      cooldownPeriod: 300
      maxReplicas: 1
      minReplicas: 1   # keep one replica alive until go-live is verified;
                       # flip to 0 for true scale-to-zero afterwards
      pollingInterval: 30
      rules: null
    serviceBinds: null
    terminationGracePeriodSeconds: null
  workloadProfileName: Consumption
